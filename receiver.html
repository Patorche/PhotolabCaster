<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Photolab Caster</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #log {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 40%;
            overflow: auto;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 8px;
        }
        #content {
            text-align: center;
        }
    </style>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
    <div id="content">
        <h1>Photolab Caster</h1>
        <p>En attente de connexion...</p>
    </div>
    <pre id="log"></pre>

    <script>
        const LOG = document.getElementById('log');
        const CONTENT = document.getElementById('content');

        function log(...args) {
            const line = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
            console.log('[PhotolabCaster]', ...args);
            LOG.textContent += line + '\n';
            LOG.scrollTop = LOG.scrollHeight;
        }

        // 1) Création du contexte receiver
        const context = cast.framework.CastReceiverContext.getInstance();

        // 2) Gestion du MediaChannel (pour tes images via Media)
        const playerManager = context.getPlayerManager();

        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_STATUS,
            (event) => {
                log('MEDIA_STATUS', event);
                // Ici tu pourras envoyer des messages à Photolab si besoin
            }
        );

        // 3) Namespace custom Photolab
        const NAMESPACE = 'urn:x-cast:com.photolab';

        context.addCustomMessageListener(NAMESPACE, (event) => {
            log('Message reçu de Photolab:', event);

            try {
                const data = typeof event.data === 'string'
                    ? JSON.parse(event.data)
                    : event.data;

                handlePhotolabMessage(event.senderId, data);
            } catch (e) {
                log('Erreur parsing message:', e);
            }
        });

        function sendToPhotolab(senderId, message) {
            log('Envoi vers Photolab:', message);
            context.sendCustomMessage(NAMESPACE, senderId, message);
        }

        // 4) Gestion des messages Photolab → Receiver
        function handlePhotolabMessage(senderId, msg) {
            log('handlePhotolabMessage', msg);

            switch (msg.type) {
                case 'hello':
                    sendToPhotolab(senderId, {
                        type: 'helloAck',
                        device: 'PhotolabCaster',
                        receiverVersion: '1.0'
                    });
                    CONTENT.innerHTML = '<h1>Photolab connecté</h1><p>Prêt à recevoir des commandes.</p>';
                    break;

                case 'navigate':
                    handleNavigate(senderId, msg);
                    break;

                case 'slideshowStart':
                    handleSlideshowStart(senderId, msg);
                    break;

                case 'slideshowStop':
                    handleSlideshowStop(senderId, msg);
                    break;

                case 'theme':
                    handleTheme(msg);
                    break;

                default:
                    log('Type de message non géré:', msg.type);
                    break;
            }
        }

        function handleNavigate(senderId, msg) {
            log('Navigation demandée:', msg);
            // Pour l’instant, on affiche juste un texte
            CONTENT.innerHTML = `
                <h1>Navigation</h1>
                <p>Target: ${msg.target}</p>
                <p>${msg.catalogId || msg.collectionId || msg.photoId || ''}</p>
            `;
        }

        function handleSlideshowStart(senderId, msg) {
            log('Slideshow start:', msg);
            // Ici, plus tard, tu pourras piloter le MediaChannel ou une UI custom
            CONTENT.innerHTML = `
                <h1>Diaporama</h1>
                <p>Collection: ${msg.collectionId}</p>
                <p>Index de départ: ${msg.startIndex ?? 0}</p>
            `;
            // Exemple : notifier Photolab
            sendToPhotolab(senderId, {
                type: 'slideshowStarted',
                collectionId: msg.collectionId
            });
        }

        function handleSlideshowStop(senderId, msg) {
            log('Slideshow stop');
            CONTENT.innerHTML = `
                <h1>Photolab Caster</h1>
                <p>Diaporama arrêté.</p>
            `;
            sendToPhotolab(senderId, {
                type: 'slideshowEnded'
            });
        }

        function handleTheme(msg) {
            log('Theme reçu:', msg);
            if (msg.background) {
                document.body.style.background = msg.background;
            }
            // Tu peux aussi changer couleurs de texte, accents, etc.
        }

        // 5) Configuration du receiver
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true; // pour éviter que le receiver se coupe trop vite
		options.customNamespaces = {
			[NAMESPACE]: cast.framework.system.MessageType.JSON
		};
        context.start(options);

        log('PhotolabCaster receiver démarré.');
    </script>
</body>
</html>
